<!DOCTYPE html>
<!-- 1단계: HTML 기본 골격 -->
<html lang="ko">
<head>
  <body>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL - 메인 페이지</title>

    <!-- 2단계: 부트스트랩 5 CDN 연결 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/test.js"></script>
    <script src="../js/test2.js"></script>
    <script src="../js/toggle.js"></script>
    <script src="../js/login.js"></script>
    <script src="../js/input_sha256.js"></script>
    <script src="../js/profile.js"></script>
  


    <!-- 네비게이션 바 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand d flex align-item-center" href="../main_index.html">
            <img src="../image/LOL.png" alt="" width="45" height="45">
            리그오브레전드
        </a>
        <!-- [변경] "Navbar" 텍스트 → 다크/라이트 토글 버튼 -->
        <button class="btn border-0 ms-auto theme-btn"
        id="themeToggleBtn">
        <span class="theme-icon">🌙</span>
        <span class="theme-text">DARK</span>
        </button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="../main_index.html">메인메뉴</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">뉴스</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">챔피언</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="../main_page_sub/download.html">다운로드</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logout">로그아웃</a>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
              외부사이트
            </a>
            <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
              <li><a class="dropdown-item" href="https://www.leagueoflegends.com/ko-kr/">롤공식홈</a></li>
              <li><a class="dropdown-item" href="https://lol.ps/">롤전적</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">관련유튜브</a></li>
            </ul>
          </li>
        </ul>
        <form class="d-flex" id="searchForm" role="search">
          <input class="form-control me-2" type="search" placeholder="챔피언, 뉴스 검색..." aria-label="Search" id="searchInput">
          <button class="btn btn-outline-success" type="submit">Search</button>
        </form>
      </div>
    </div>
    <script src="js/toggle.js"></script>
  </nav>

<section class="hero d-flex align-items-center
            justify-content-center text-center py-5">
        <div class="container" style="max-width: 500px;">
            <h2 class="fw-bold mb-4"> 내 프로필</h2>
        
            <!-- 프로필 사진 영역 -->
            <div class="mb-4">
            <img id="profileImg"
                src="../uploads/profile/default.png"
                class="rounded-circle"
                width="120" height="120"
                style="object-fit:cover; border:3px solid #fff;"
                alt="프로필 사진">
            </div>
        <!-- 개인 정보 출력 -->
            <div class="card bg-dark text-white border-secondary mb-4">
                <div class="card-body text-start">
                    <table class="table table-dark table-bordered mb-0">
                        <tr>

        <th style="width:30%">아이디</th>
                    <td id="infoUsername"></td>
                </tr>
                <tr>
                    <th>이메일</th>
                    <td id="infoEmail"></td>
                </tr>
                <tr>
                    <th>연락처</th>
                    <td id="infoPhone"></td>
                </tr>
            </table>
        </div>
    </div>
    <!-- 사진 업로드 폼 -->
    <form id="uploadForm"
        method="POST"
        action="/profile/upload"
        enctype="multipart/form-data">
    <div class="mb-3">

<label class="form-label">프로필 사진 변경</label>
        <input type="file"
            class="form-control"
            id="profileFile"
            name="profileImage"
            accept="image/jpeg,image/png,image/gif,image/webp">
        <div class="form-text text-muted">
        jpg, png, gif, webp / 최대 5MB
        </div>
    </div>
    <button type="submit"
            class="btn btn-primary w-100">
        사진 업로드
    </button>
    <hr class="my-4">
    <!-- 토글 버튼 -->
    <button class="btn btn-warning w-100 mb-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#updateFormArea"
          aria-expanded="false">
          개인정보 수정
    </button>

    
    <!-- 기본 숨김 → 버튼 클릭 시 펼쳐짐 -->
    <div class="collapse" id="updateFormArea">
      <div class="card card-body bg-dark
                text-white border-secondary mt-2">
        <!-- 수정 결과 메시지 -->
        <div id="updateMsg" class="alert d-none mb-3"></div>
        <form id="updateForm"
            method="POST"
            action="/profile/update">

        <div class="mb-3 text-start">
          <label class="form-label">이메일</label>
          <input type="text" class="form-control"
              id="updateEmail" name="email"
              placeholder="example@email.com">
          <div class="invalid-feedback" id="updateEmailMsg"></div>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label">연락처</label>
            <input type="text" class="form-control"
                  id="updatePhone" name="phone"
                  placeholder="010-0000-0000">
            <div class="invalid-feedback" id="updatePhoneMsg"></div>
        </div>

        <button type="button"
              class="btn btn-warning w-100"
              onclick="validateAndUpdate()">
          수정 완료
        </button>
      </form>
      <hr class="my-4">
      <h5 class="fw-bold mb-3"> 비밀번호 변경</h5>

      <!-- 결과 메시지 -->
      <div id="pwMsg" class="alert d-none mb-3"></div>

      <form id="pwForm"
        method="POST"
        action="/profile/password">

      <div class="mb-3 text-start">
        <label class="form-label">현재 비밀번호</label>
        <!-- 입력용 (서버 전송 안 됨) -->
        <input type="password" class="form-control"
              id="currentPwInput"
              placeholder="현재 비밀번호 입력" required>

      <div class="invalid-feedback" id="currentPwMsg"></div>
        <!-- 해시값 전송용 hidden -->
        <input type="hidden" id="currentPassword"
              name="currentPassword">
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">새 비밀번호</label>
        <input type="password" class="form-control"
            id="newPwInput"
            placeholder="8자 이상, 영문+숫자+특수문자" required>
      <div class="invalid-feedback" id="newPwMsg"></div>
      <input type="hidden" id="newPassword"
          name="newPassword">
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">새 비밀번호 확인</label>
        <input type="password" class="form-control"
            id="newPwConfirm"
            placeholder="새 비밀번호 재입력" required>
        <div class="invalid-feedback" id="newPwConfirmMsg"></div>
      </div>

      <button type="button"
            class="btn btn-danger w-100"
            onclick="validateAndChangePassword()">
        비밀번호 변경
      </button>
    </form>
  </div>
</div>
</form>
</div>
</section>
<!-- 토스트 컨테이너 </body> 바로 위에 추가 -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="liveToast" class="toast align-items-center text-white bg-success border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastBody">
        메시지
      </div>
      <button type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>


<!-- 네비바 → index.html과 동일하게 복사 -->
<script src="../js/search.js"></script>
<script src="../js/toggle.js"></script>

<script src="../js/profile.js"></script>
</body>
</html>
