<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>징크스 상세</title>
  
  <!-- Bootstrap 5 CSS (index.html과 동일하게 연동) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- LOL 스타일 맞추기 위한 간단 커스텀 (필요 시 resources/css/custom.css로 이동) -->
  <style>
    body {
      background-color: #0a0e17;
      color: white;
      padding: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
    }
    h3, h4 {
      color: #c8aa6e; /* LOL 골드 톤 */
    }
    .text-muted {
      color: #a0a0a0 !important;
    }
    .list-group-item {
      background: transparent;
      border-color: #444;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-4">
      
      <!-- 왼쪽: 이미지 + 기본 정보 -->
      <div class="col-lg-5 text-center">
        <img src="../image/Jinx.jpg" class="img-fluid rounded shadow-lg" alt="징크스" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">징크스 (Jinx)</h3>
          <p class="text-muted fs-5">원거리 딜러 / 난이도: 상</p>
        </div>
      </div>
      
      <!-- 오른쪽: 스킬 + 스토리 -->
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 신난다!</li>
          <li class="list-group-item">Q: 휘릭휘릭!</li>
          <li class="list-group-item">W: 빠직!</li>
          <li class="list-group-item">E: 와작와작 뻥!</li>
          <li class="list-group-item">R: 초강력 초토화 로켓!</li>
        </ul>

        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
        <p class="text-secondary lh-lg">
          지하도시 출신의 충동적이고 불안정한 범죄자 징크스는 자신의 과거가 빚어낸 결과에 시달리면서도 
          필트오버와 자운에 특유의 대혼란을 일으키는 것을 멈추지 않는다. 
          손수 만든 무기를 파괴적으로 사용해 화려한 폭발과 총격을 쏟아내며 
          가는 곳마다 쑥대밭을 만들어 소외된 자들을 반란과 저항으로 이끈다.
        </p>
      </div>
      
    </div>
  </div>

</body>
</html>
